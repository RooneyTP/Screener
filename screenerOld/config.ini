# Daily Analysis Configuration
# Edit values below to customize behavior

[screening]
# Screener script to use (auto-detect if not set)
# Options: screener.py, screener_mock.py, or custom path
screener_script = auto

# Minimum CSS score threshold for candidates
min_score = 75.0

# Maximum number of candidates to report
max_candidates = 5

# Only send alert if at least one candidate exceeds this score
# Range: 0-15 (CSS score range)
alert_threshold = 10.0

[research]
# Enable news research (disable for faster testing)
enable_news_research = true

# News sources to search (comma-separated)
news_sources = bisnis.com, cnbcindonesia.com, kontan.co.id

# Maximum news items per ticker
max_news_per_ticker = 3

# Search query templates (use {ticker} placeholder)
query_templates = {ticker} saham hari ini, {ticker} breakout, {ticker} earnings

[telegram]
# Telegram bot token (@QuantYan_bot)
bot_token = YOUR_BOT_TOKEN_HERE

# Target chat ID for daily reports
chat_id = -5237365204

# Enable Telegram sending (false = dry-run mode, only print)
enable_send = true

# Retry settings
max_retries = 3
retry_delay_seconds = 5

[alerts]
# Smart filtering: only send if conditions met
smart_filter_enabled = true

# Minimum candidates required to send alert (0 = always send)
min_candidates_required = 1

# Send summary even if no strong signals
always_send_summary = false

[logging]
# Log directory
log_dir = C:\Hermes_Workspace\logs

# Output directory for reports
output_dir = C:\Hermes_Workspace\output

# Keep logs for N days
retention_days = 30

# Enable performance tracking (compare with previous day)
track_performance = true
